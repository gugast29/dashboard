  <script>
    let sidebarOpen = true;
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      const toggle  = document.getElementById('sidebarToggle');
      const isMobile = window.innerWidth < 768;
      if (isMobile) { sidebar.classList.toggle('open'); overlay.classList.toggle('hidden'); toggle.setAttribute('aria-expanded', String(sidebar.classList.contains('open'))); }
      else { sidebar.classList.toggle('collapsed'); sidebarOpen = !sidebarOpen; toggle.setAttribute('aria-expanded', String(sidebarOpen)); }
    }
    window.addEventListener('resize', () => { if (window.innerWidth >= 768) document.getElementById('overlay').classList.add('hidden'); });

    // Mark active nav item based on current page
    const current = location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.nav-item').forEach(el => {
      if (el.getAttribute('href') === current) { el.classList.add('active'); el.setAttribute('aria-current','page'); }
    });
